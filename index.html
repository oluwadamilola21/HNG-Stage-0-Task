<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <title>To-do Card</title>
</head>

<body>
    <article data-testid="test-todo-card">
        <div class="title-box">
            <h2 data-testid="test-todo-title">
                Project Defence Preparation
            </h2>
            <div class="checkbox-group">
                <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle" />
                <label for="complete-toggle">Mark as complete</label>
            </div>
        </div>

        <p class="description" data-testid="test-todo-description">
            Finish up my slide for Project Defence Presentation
        </p>

        <div class="status-box">

            <div class="status-left">
                <span class="badge high" data-testid="test-todo-priority" aria-label="High Priority">
                    High
                </span>

                <span class="status pending" data-testid="test-todo-status">
                    Pending
                </span>
            </div>

            <p data-testid="test-todo-time-remaining" aria-live="polite">
                Due in 5 days
            </p>

        </div>

        <div class="info">
            <p>
                <time class="due" data-testid="test-todo-due-date" datetime="2026-04-17T18:00:00">
                    Due Apr 17, 2026
                </time>
            </p>
            <ul class="tags" data-testid="test-todo-tags" role="list">
                <li data-testid="test-todo-tag-work">work</li>
                <li data-testid="test-todo-tag-urgent">urgent</li>
            </ul>
        </div>


        <div class="actions">
            <button class="edit" data-testid="test-todo-edit-button" aria-label="Edit task">
                Edit
            </button>

            <button class="delete" data-testid="test-todo-delete-button" aria-label="Delete task">
                Delete
            </button>
        </div>
    </article>
    <script src="index.js"></script>
</body>

</html>
